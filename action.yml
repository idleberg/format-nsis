name: "NSIS Format"
description: "Format NSIS scripts with ardent"
author: "Jan T. Sott"

branding:
  icon: "command"
  color: "blue"

inputs:
  version:
    description: "Version of ardent to install (leave empty for latest)"
    required: false
    default: ""

  files:
    description: "Files or glob patterns to format (space-separated)"
    required: false
    default: "**/*.nsi **/*.nsh"

  eol:
    description: 'Control how line-breaks are represented ("crlf" or "lf")'
    required: false
    default: ""

  indent-size:
    description: "Number of units per indentation level"
    required: false
    default: ""

  use-spaces:
    description: "Indent with spaces instead of tabs"
    required: false
    default: "false"

  no-trim:
    description: "Do not trim empty lines"
    required: false
    default: "false"

  print-width:
    description: "Maximum line width before wrapping with line continuations (0 to disable)"
    required: false
    default: ""

  check-only:
    description: "Only check formatting without modifying files (fails if unformatted)"
    required: false
    default: "false"

  working-directory:
    description: "Working directory to run ardent in."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup ardent
      uses: idleberg/setup-ardent@ea69cc9475a7a312e765211ae5638327bcc29d2c # v1.0.0
      with:
        version: ${{ inputs.version }}

    - name: Run ardent
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "::group::Run ardent"
        if [ "$ARDENT_CHECK_ONLY" = "true" ]; then
          ardent check $ARDENT_ARGS ${{ inputs.files }}
        else
          ardent format --write $ARDENT_ARGS ${{ inputs.files }}
        fi
        echo "::endgroup::"
      env:
        ARDENT_CHECK_ONLY: ${{ inputs.check-only }}
        ARDENT_ARGS: |
          ${{ inputs.eol != '' && format('--eol {0}', inputs.eol) || '' }}
          ${{ inputs.indent-size != '' && format('--indent-size {0}', inputs.indent-size) || '' }}
          ${{ inputs.use-spaces == 'true' && '--use-spaces' || '' }}
          ${{ inputs.no-trim == 'true' && '--no-trim' || '' }}
          ${{ inputs.print-width != '' && format('--print-width {0}', inputs.print-width) || '' }}
